[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning

[coverage:run]
source = plugins/cursor_cli
branch = true
omit = plugins/cursor_cli/__main__.py

[coverage:report]
fail_under = 80
show_missing = true
precision = 1
